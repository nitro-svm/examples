[package]
name = "backtest-example"
version = "0.1.0"
edition = "2024"
description = "Raw backtest session example — WebSocket control + HTTP JSON-RPC, no internal libs"

[[bin]]
name = "backtest-example"
path = "src/main.rs"

[dependencies]
anyhow = "1"
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
solana-client = "3.1.0"
solana-commitment-config = "3.1.0"
solana-loader-v3-interface = "6.0.0"
solana-pubkey = "3"
solana-rpc-client-api = "3.1.0"
tokio = { version = "1", features = ["full"] }
url = "2"
# native-tls is required for wss:// connections; remove the feature flag if
# you only connect to ws:// (plain, non-TLS) endpoints.
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
